<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Shubook Labs</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="{{ '/assets/images/logo/shubook-labs-black.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/logo/shubook-labs-black.png' | relative_url }}">

  <meta name="description" content="{{ page.description | default: 'Premium podcast and content creation studio' }}">

  <!-- CRITICAL INLINE CSS (PREVENTS LAYOUT SHIFT) -->
  <style>
    /* RESET & BASE */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0B1120;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ===== HEADER RESERVATION - MATCHES YOUR EXACT HEADER ===== */
    .site-header-fixed {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 0.75rem 1rem;
      background: transparent;
    }

    .header-container {
      max-width: 80rem;
      margin-left: auto;
      margin-right: auto;
    }

    .header-glass-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem;
      background-color: rgba(17, 24, 39, 0.8);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 1rem;
      min-height: 72px; /* Reserve exact height */
    }

    @media (min-width: 768px) {
      .header-glass-card {
        padding: 0.75rem 1.25rem;
      }
    }

    /* Logo */
    .logo-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    
    .logo-image {
      display: block;
      width: 8rem;
      height: 2.5rem;
      object-fit: cover;
      border-radius: 0.5rem;
    }
    
    @media (min-width: 1024px) {
      .logo-image {
        height: 3rem;
      }
    }

    /* Desktop Navigation */
    .desktop-nav {
      display: none;
      align-items: center;
      gap: 0.25rem;
    }
    
    @media (min-width: 1024px) {
      .desktop-nav {
        display: flex;
      }
    }

    /* Header Actions */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    @media (min-width: 640px) {
      .header-actions {
        gap: 0.75rem;
      }
    }

    /* WhatsApp Button */
    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.75rem;
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      color: white;
      text-decoration: none;
      white-space: nowrap;
    }
    
    @media (min-width: 640px) {
      .whatsapp-btn {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
      }
    }
    
    @media (min-width: 1024px) {
      .whatsapp-btn {
        padding: 0.625rem 1.25rem;
        font-size: 1rem;
      }
    }
    
    .whatsapp-btn svg {
      width: 1.25rem;
      height: 1.25rem;
      flex-shrink: 0;
    }

    /* Mobile Menu Button */
    .mobile-menu-btn {
      display: flex;
      height: 2.5rem;
      width: 2.5rem;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    
    @media (min-width: 1024px) {
      .mobile-menu-btn {
        display: none;
      }
    }

    /* ===== MAIN CONTENT RESERVATION ===== */
    main {
      display: block;
      margin-top: 80px;
      min-height: calc(100vh - 80px);
    }

    /* ===== IMAGE SHIFT PREVENTION ===== */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    
    img[width], img[height] {
      aspect-ratio: attr(width) / attr(height);
    }

    /* ===== BUTTON RESERVATION ===== */
    .button-shine {
      min-height: 48px;
    }
    
    @media (max-width: 640px) {
      .button-shine {
        min-height: 44px;
      }
    }
  </style>

  <!-- SYNCHRONOUS CSS - NO MORE ASYNC TRICKS! -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="bg-dark-bg">
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}

  <!-- CLS MONITORING (Debug only) -->
  <script>
    if (PerformanceObserver && location.hostname !== 'localhost') {
      new PerformanceObserver((list) => {
        for (const entry of list.getEntries()) {
          if (!entry.hadRecentInput && entry.value > 0.01) {
            console.warn(`⚠️ Layout shift detected: ${entry.value.toFixed(4)}`);
            if (entry.sources) {
              console.log('Elements that shifted:', entry.sources);
            }
          }
        }
      }).observe({ entryTypes: ['layout-shift'] });
    }
  </script>
</body>
</html>
