<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Shubook Labs</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="{{ '/assets/images/logo/shubook-labs-black.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/logo/shubook-labs-black.png' | relative_url }}">

  <meta name="description" content="{{ page.description | default: 'Premium podcast and content creation studio' }}">
  
  <!-- Cache Control for bfcache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Preconnect for external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload critical CSS -->
  <link rel="preload" href="{{ '/assets/css/style.css' | relative_url }}" as="style">
  
  <!-- Minified Critical Inline CSS -->
  <style>
    /* FOUC Prevention & Layout Shift Fixes */
    body{background-color:#0B1120;margin:0;padding:0;visibility:visible}main.container{min-height:200px}.content-wrapper{opacity:0;transition:opacity .2s ease-in-out}.css-loaded .content-wrapper{opacity:1}
    
    /* Button Shine Effect */
    .button-shine{position:relative;overflow:hidden;display:inline-flex}.scan-line{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:scan-shine 3s ease-in-out infinite;pointer-events:none;z-index:1}@keyframes scan-shine{0%{left:-100%}50%,100%{left:100%}}.button-shine>:not(.scan-line){position:relative;z-index:2}.button-shine:hover{transform:scale(1.05)}.button-shine.border-brand:hover{background:linear-gradient(135deg,#2563EB 0%,#3B82F6 50%,#60A5FA 100%)!important;border-color:transparent!important;color:#fff!important}
    
    /* Glass Effect */
    .glass{background:rgba(255,255,255,.05);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1)}
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:#1a1a1a}::-webkit-scrollbar-thumb{background:#3B82F6;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#60A5FA}
    
    /* Mobile Optimizations */
    @media (max-width:768px){.glass{backdrop-filter:none!important}.premium-card,.premium-price-card{backdrop-filter:none}}
    
    /* Animation Performance */
    .animate-spin-slow,.animate-spin-slow-reverse,.animate-float{will-change:transform;backface-visibility:hidden}
    
    /* Image Optimization */
    img{max-width:100%;height:auto;display:block}img:not([width]){aspect-ratio:attr(width)/attr(height)}
    
    /* Reduced Motion Preferences */
    @media (prefers-reduced-motion:reduce){*,::before,::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  </style>

  <!-- Async CSS Loading -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" media="print" onload="this.media='all';this.onload=null;">
  <noscript><link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"></noscript>
</head>

<body class="bg-dark-bg text-gray-300">
  <!-- FOUC Prevention Wrapper -->
  <div class="content-wrapper">
    {% include header.html %}
    <main class="container rounded-lg shadow-lg">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>

  <!-- Optimized CSS Loaded Detection -->
  <script>
    (function(){
      function cssLoaded(){
        document.body.classList.add('css-loaded');
      }
      if('requestIdleCallback' in window){
        requestIdleCallback(cssLoaded,{timeout:100});
      }else{
        setTimeout(cssLoaded,100);
      }
      if(document.styleSheets.length){
        cssLoaded();
      }
    })();
  </script>

  <!-- bfcache & Performance Scripts -->
  <script>
    (function(){
      // Handle bfcache restore
      window.addEventListener('pageshow', function(event){
        if(event.persisted){
          document.body.classList.remove('css-loaded');
          setTimeout(function(){
            document.body.classList.add('css-loaded');
          },50);
          // Reinitialize any WebSocket connections if needed
          if(window.reinitAfterBFCache){
            window.reinitAfterBFCache();
          }
        }
      });
      
      // Lazy load non-critical resources
      if('IntersectionObserver' in window){
        const lazyElements = document.querySelectorAll('img[data-src], iframe[data-src]');
        const lazyObserver = new IntersectionObserver((entries, observer)=>{
          entries.forEach(entry=>{
            if(entry.isIntersecting){
              const el = entry.target;
              if(el.dataset.src){
                if(el.tagName === 'IMG'){
                  el.src = el.dataset.src;
                }else if(el.tagName === 'IFRAME'){
                  el.src = el.dataset.src;
                }
                el.removeAttribute('data-src');
                lazyObserver.unobserve(el);
              }
            }
          });
        });
        lazyElements.forEach(el=>lazyObserver.observe(el));
      }
      
      // Monitor for layout shifts
      if(PerformanceObserver && location.hostname !== 'localhost'){
        try{
          const clsObserver = new PerformanceObserver((list)=>{
            for(const entry of list.getEntries()){
              if(entry.value > 0.1){
                console.warn('High CLS detected:', entry.value);
              }
            }
          });
          clsObserver.observe({entryTypes:['layout-shift']});
        }catch(e){}
      }
      
      // Clean up before page unload for bfcache
      window.addEventListener('beforeunload', ()=>{
        if(window.socket && window.socket.close){
          window.socket.close();
        }
      });
    })();
  </script>

  <!-- Defer JavaScript loading -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>

</html>
