<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  {% include seo/head.html %}
  <!-- ============================================ -->
  <!-- CRITICAL MINIMAL CSS (Above-the-fold)       -->
  <!-- ============================================ -->
  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #0B1120;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif
    }

    main {
      display: block;
      margin-top: 80px;
      min-height: calc(100vh - 80px)
    }

    img {
      max-width: 100%;
      height: auto;
      display: block
    }

    /* HEADER - MINIMAL */
    .site-header-fixed {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: .75rem 1rem
    }

    .header-container {
      max-width: 80rem;
      margin: 0 auto
    }

    .header-glass-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: .75rem;
      background: rgba(17, 24, 39, .8);
      border: 1px solid rgba(59, 130, 246, .2);
      border-radius: 1rem;
      min-height: 72px
    }

    @media(min-width:768px) {
      .header-glass-card {
        padding: .75rem 1.25rem
      }
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0
    }

    .logo-image {
      display: block;
      width: 8rem;
      height: 2.5rem;
      object-fit: cover;
      border-radius: .5rem
    }

    @media(min-width:1024px) {
      .logo-image {
        height: 3rem
      }
    }

    .desktop-nav {
      display: none;
      align-items: center;
      gap: .25rem
    }

    @media(min-width:1024px) {
      .desktop-nav {
        display: flex
      }
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: .5rem
    }

    @media(min-width:640px) {
      .header-actions {
        gap: .75rem
      }
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: .75rem;
      padding: .375rem .75rem;
      font-size: .75rem;
      color: #fff;
      text-decoration: none;
      white-space: nowrap
    }

    @media(min-width:640px) {
      .whatsapp-btn {
        padding: .5rem 1rem;
        font-size: .875rem
      }
    }

    @media(min-width:1024px) {
      .whatsapp-btn {
        padding: .625rem 1.25rem;
        font-size: 1rem
      }
    }

    .whatsapp-btn svg {
      width: 1.25rem;
      height: 1.25rem;
      flex-shrink: 0
    }

    .mobile-menu-btn {
      display: flex;
      height: 2.5rem;
      width: 2.5rem;
      align-items: center;
      justify-content: center;
      border-radius: .75rem;
      border: 1px solid rgba(255, 255, 255, .1);
      background: rgba(255, 255, 255, .05);
      cursor: pointer
    }

    @media(min-width:1024px) {
      .mobile-menu-btn {
        display: none
      }
    }

    /* ============================================ */
    /* CURSOR - Hidden on mobile, visible on desktop */
    /* ============================================ */

    @media (min-width: 1024px) {

      body,
      a,
      button,
      input,
      textarea,
      select,
      [role="button"],
      .btn,
      .link,
      .whatsapp-btn,
      .mobile-menu-btn {
        cursor: none !important;
      }
    }

    .cursor-circle {
      position: fixed;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999999;
      transform: translate(-50%, -50%);
      transition: width .15s ease, height .15s ease;
      display: none;
    }

    @media (min-width: 1024px) {
      .cursor-circle {
        display: block;
      }
    }

    .cursor-circle::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid #3B82F6;
      opacity: .8;
      transition: all .15s ease
    }

    .cursor-circle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      background: #60A5FA;
      border-radius: 50%;
      box-shadow: 0 0 8px #3B82F6
    }

    .cursor-circle.hover-mode {
      width: 48px;
      height: 48px
    }

    .cursor-circle.hover-mode::before {
      border-color: #60A5FA;
      border-width: 2.5px;
      opacity: 1
    }

    .cursor-circle.hover-mode::after {
      width: 6px;
      height: 6px;
      background: #93C5FD;
      box-shadow: 0 0 12px #3B82F6
    }

    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999998;
      overflow: hidden;
      display: none;
    }

    @media (min-width: 1024px) {
      .ripple-container {
        display: block;
      }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, .4), rgba(96, 165, 250, .1));
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: rippleExpand .6s ease-out forwards
    }

    @keyframes rippleExpand {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: .6
      }

      100% {
        transform: translate(-50%, -50%) scale(4);
        opacity: 0
      }
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #60A5FA;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFloat .5s ease-out forwards
    }

    @keyframes particleFloat {
      0% {
        transform: scale(1);
        opacity: .8
      }

      100% {
        transform: scale(0);
        opacity: 0
      }
    }
  </style>

  <!-- SYNCHRONOUS CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-851J5E07F3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-851J5E07F3');
  </script>

</head>

<body class="bg-dark-bg">
  <!-- Cursor Elements -->
  <div class="cursor-circle" id="cursorCircle"></div>
  <div class="ripple-container" id="rippleContainer"></div>

  <!-- Components -->
  {% include components/fixed-button.html %}
  
  <!-- Header -->
  {% include header.html %}

  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  {% include footer.html %}
  <script src="{{ '/assets/js/cursor.js' | relative_url }}" defer></script>
</body>
</html>
