<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Shubook Labs</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="{{ '/assets/images/logo/shubook-labs-black.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/logo/shubook-labs-black.png' | relative_url }}">
  
  <meta name="description" content="{{ page.description | default: 'Premium podcast and content creation studio' }}">
  
  <!--  Critical CSS (inline - loads immediately) -->
 <style>
    {% include assets/css/critical.css %}
</style>
  
  <!--  Main CSS (deferred - loads after page render) -->
  <link rel="preload" href="{{ '/assets/css/style.css' | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </noscript>
  
  <!--  Additional critical styles that must be here -->
  <style>
    /* Button Shine Effect - Critical for interactions */
    .button-shine {
      position: relative;
      overflow: hidden;
      display: inline-flex;
    }
    
    .scan-line {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      animation: scan-shine 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }
    
    @keyframes scan-shine {
      0% { left: -100%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }
    
    .button-shine > :not(.scan-line) {
      position: relative;
      z-index: 2;
    }
    
    .button-shine:hover {
      transform: scale(1.05);
    }
    
    .button-shine.border-brand:hover {
      background: linear-gradient(135deg, #2563EB 0%, #3B82F6 50%, #60A5FA 100%) !important;
      border-color: transparent !important;
      color: white !important;
    }
    
    /* Glass effect utility */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    /* Animation utilities */
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #3B82F6;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #60A5FA;
    }
    
    /* Additional critical responsive styles */
    @media (max-width: 768px) {
      .animate-spin-slow,
      .animate-spin-slow-reverse,
      .animate-float,
      .animate-pulse {
        animation: none !important;
      }
      
      .premium-card,
      .premium-price-card {
        backdrop-filter: none;
      }
      
      .glass {
        backdrop-filter: none !important;
      }
    }
  </style>
</head>

<body class="bg-dark-bg text-gray-300">
  {% include header.html %}
  <main class="container rounded-lg shadow-lg">
    {{ content }}
  </main>
  {% include footer.html %}
  
  <!-- Load JavaScript deferred -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
