<header class="fixed top-4 left-0 right-0 z-50 px-4 md:left-1/2 md:-translate-x-1/2 md:w-fit">

  <div class="max-w-md mx-auto lg:max-w-none">

    <div
      class="flex items-center justify-between
             px-7 py-4
             gap-2
             rounded-full
             bg-dark-card/80
             backdrop-blur-xl
             border border-brand/20">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-3">
        <span class="font-semibold text-white text-sm">
          Shubook
        </span>
      </a>

      <!-- Divider -->
      <div class="hidden lg:block">
        {% lucide_icon "minus" size="30" class="text-white/50 rotate-90" %}
      </div>

      <!-- Desktop Nav -->
      <nav class="hidden lg:flex items-center gap-8">
        <a href="/services" class="nav-link">Services</a>
        <a href="/studio-rent" class="nav-link">Studio Rent</a>
        <a href="/podcast" class="nav-link">Podcast</a>
        <a href="/portfolio" class="nav-link">Portfolio</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/faq" class="nav-link">FAQ</a>
        <a href="/contact" class="nav-link">Contact</a>
      </nav>

      <!-- Mobile Button -->
      <button
        id="menuBtn"
        class="lg:hidden
               h-10 w-10
               rounded-full
               border border-white/10
               bg-white/5
               flex items-center justify-center
               hover:bg-white/10 transition-colors">

        {% lucide_icon "menu" size="20" class="text-white" %}

      </button>

    </div>

    <!-- Floating Mobile Menu -->
    <div
      id="mobileMenu"
      class="hidden lg:hidden mt-3">

      <div
        class="rounded-3xl
               bg-dark-card/95
               backdrop-blur-xl
               border border-brand/20
               overflow-hidden">

        <nav class="flex flex-col p-2">
          <a href="/services" class="mobile-link">Services</a>
          <a href="/studio-rent" class="mobile-link">Studio Rent</a>
          <a href="/podcast" class="mobile-link">Podcast</a>
          <a href="/portfolio" class="mobile-link">Portfolio</a>
          <a href="/about" class="mobile-link">About</a>
          <a href="/faq" class="mobile-link">FAQ</a>
          <a href="/contact" class="mobile-link">Contact</a>
        </nav>

      </div>

    </div>

  </div>

</header>

<style>
  /* ============================================
     HEADER NAVIGATION STYLES - NO SHADOWS
  ============================================ */
  
  /* Remove all focus outlines and shadows */
  *:focus {
    outline: none;
    box-shadow: none;
  }
  
  /* Desktop Navigation Links */
  .nav-link {
    position: relative;
    font-weight: 500;
    font-size: 0.9375rem;
    color: #CBD5E1;
    transition: color 0.3s ease;
    letter-spacing: 0.3px;
    text-decoration: none;
  }
  
  .nav-link:hover {
    color: #60A5FA;
  }
  
  /* Active link indicator */
  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 100%;
    height: 2px;
    background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%);
    border-radius: 2px;
    transition: transform 0.3s ease;
    transform-origin: center;
  }
  
  .nav-link:hover::after {
    transform: translateX(-50%) scaleX(1);
  }
  
  .nav-link.active {
    color: #60A5FA;
  }
  
  .nav-link.active::after {
    transform: translateX(-50%) scaleX(1);
  }
  
  /* Mobile Navigation Links */
  .mobile-link {
    display: block;
    padding: 0.875rem 1.25rem;
    font-weight: 500;
    font-size: 1rem;
    color: #CBD5E1;
    transition: all 0.3s ease;
    border-radius: 1rem;
    letter-spacing: 0.3px;
    text-decoration: none;
  }
  
  .mobile-link:hover {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(96, 165, 250, 0.05) 100%);
    color: #60A5FA;
    transform: translateX(4px);
  }
  
  .mobile-link.active {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(96, 165, 250, 0.08) 100%);
    color: #60A5FA;
    border-left: 2px solid #3B82F6;
  }
  
  /* Mobile Menu Animation */
  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  #mobileMenu:not(.hidden) {
    animation: slideDown 0.3s ease-out;
  }
  
  /* Remove any button focus ring */
  button:focus,
  button:focus-visible {
    outline: none;
    box-shadow: none;
  }
  
  /* Remove any shadow from header container */
  header div div {
    box-shadow: none !important;
  }
  
  /* Responsive */
  @media (max-width: 768px) {
    .nav-link {
      font-size: 0.875rem;
    }
  }
</style>

<script>
  // Mobile menu toggle functionality
  const menuBtn = document.getElementById('menuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  
  if (menuBtn && mobileMenu) {
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });
  }
  
  // Close mobile menu when clicking a link
  const mobileLinks = document.querySelectorAll('.mobile-link');
  mobileLinks.forEach(link => {
    link.addEventListener('click', () => {
      mobileMenu.classList.add('hidden');
    });
  });
</script>
