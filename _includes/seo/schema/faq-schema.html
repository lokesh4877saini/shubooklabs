{% if page.faq_key and site.data.faq[page.faq_key] %}
  {% assign faq_items = site.data.faq[page.faq_key] %}
  {% if faq_items.size > 0 %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {% for faq in faq_items %}
        {
          "@type": "Question",
          "name": "{{ faq.question | escape }}",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "{{ faq.answer | escape }}"
          }
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    }
    </script>
  {% endif %}
{% endif %}
