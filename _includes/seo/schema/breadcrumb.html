{% if page.url != '/' %}

<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}/"
    }
    {% if page.layout == 'post' or page.layout == 'blog' %}
      ,{
        "@type": "ListItem",
        "position": 2,
        "name": "Blog",
        "item": "{{ site.url }}/blog/"
      }
      ,{
        "@type": "ListItem",
        "position": 3,
        "name": {{ page.title | jsonify }},
        "item": "{{ page.url | absolute_url }}"
      }
    {% else %}
      ,{
        "@type": "ListItem",
        "position": 2,
        "name": {{ page.title | jsonify }},
        "item": "{{ page.url | absolute_url }}"
      }
    {% endif %}
  ]
}
</script>

{% endif %}
