<script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}#webpage",
      "url": "{{ page.url | absolute_url }}",
      "name": "{{ page.title }}",
      "description": "{{ page.description | default: site.description }}",
      "isPartOf": {
        "@id": "{{ '/' | absolute_url }}#website"
      }
    }
    </script>
