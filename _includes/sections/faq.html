<!-- sections/faq.html -->
<section class="relative py-24 md:py-32 overflow-hidden bg-dark-bg">
  
  <!-- Premium Background Gradient using theme colors -->
  <div class="absolute inset-0 bg-gradient-to-br from-dark-bg via-dark-card to-dark-bg"></div>
  
  <!-- Animated gradient orbs using brand colors -->
  <div class="absolute top-20 left-1/4 w-96 h-96 rounded-full bg-brand/20 blur-[120px] animate-pulse-slow"></div>
  <div class="absolute bottom-20 right-1/4 w-80 h-80 rounded-full bg-brand-light/10 blur-[100px] animate-pulse-slow" style="animation-delay: 3s"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-brand-dark/5 blur-[140px]"></div>

  <!-- Subtle grid pattern -->
  <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:50px_50px]"></div>

  <div class="relative z-10 max-w-4xl mx-auto px-6">
    
    <!-- Section Header -->
    <div class="text-center mb-12 md:mb-16">
      <div class="inline-flex items-center gap-2 glass rounded-full px-5 py-2 mb-6">
        <span class="w-2 h-2 rounded-full bg-brand animate-pulse"></span>
        <span class="text-sm font-medium tracking-wide text-text-secondary">Got Questions?</span>
        <span class="w-2 h-2 rounded-full bg-brand animate-pulse"></span>
      </div>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold">
        Frequently Asked Questions
        <span class="bg-brand-gradient bg-clip-text text-transparent block mt-2">
          About Podcast Production in Jaipur
        </span>
      </h2>
      <div class="w-20 h-1 bg-brand-gradient rounded-full mx-auto mt-6"></div>
    </div>
    
    <!-- FAQ Accordion -->
    <div class="space-y-4">
      {% for faq in site.data.faq %}
      <div class="faq-item group">
        <details class="faq-details">
          <summary class="faq-summary">
            <span class="faq-question">{{ faq.question }}</span>
            <span class="faq-icon">
              <svg class="plus-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
          </summary>
          <div class="faq-answer">
            {{ faq.answer }}
          </div>
        </details>
      </div>
      {% endfor %}
    </div>

    <!-- Still Have Questions -->
    <div class="text-center mt-12 pt-8">
      <p class="text-text-muted">
        Still have questions? 
        <a href="/contact" class="text-brand hover:text-brand-light font-semibold transition-colors">
          Contact us
        </a>
      </p>
    </div>

  </div>
</section>

<style>
  /* FAQ Item Styling */
  .faq-item {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    border-radius: 1rem;
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.3s ease;
  }
  
  .faq-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(59, 130, 246, 0.3);
    transform: translateY(-2px);
  }
  
  /* Hide default details marker */
  .faq-details summary::-webkit-details-marker {
    display: none;
  }
  
  .faq-summary {
    list-style: none;
    cursor: pointer;
    padding: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  
  .faq-question {
    font-weight: 600;
    font-size: 1.125rem;
    color: white;
    transition: color 0.3s ease;
    flex: 1;
  }
  
  .faq-item:hover .faq-question {
    color: #3B82F6;
  }
  
  .faq-icon {
    color: #3B82F6;
    font-size: 1.5rem;
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }
  
  .plus-icon {
    width: 20px;
    height: 20px;
    transition: transform 0.3s ease;
  }
  
  /* Rotate icon when open */
  .faq-details[open] .plus-icon {
    transform: rotate(45deg);
  }
  
  .faq-answer {
    padding: 0 1.5rem 1.5rem 1.5rem;
    color: #94A3B8;
    line-height: 1.7;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    margin-top: 0.5rem;
    animation: fadeIn 0.3s ease-out;
  }
  
  /* Smooth fade-in animation */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(-8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  /* Pulse animation for background orbs */
  @keyframes pulse-slow {
    0%, 100% {
      opacity: 0.3;
      transform: scale(1);
    }
    50% {
      opacity: 0.6;
      transform: scale(1.1);
    }
  }
  
  .animate-pulse-slow {
    animation: pulse-slow 8s ease-in-out infinite;
  }
  
  /* Glass effect for header badge */
  .glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  /* Responsive adjustments */
  @media (max-width: 640px) {
    .faq-question {
      font-size: 1rem;
    }
    
    .faq-summary {
      padding: 1.25rem;
    }
    
    .faq-answer {
      padding: 0 1.25rem 1.25rem 1.25rem;
      font-size: 0.875rem;
    }
  }
</style>
