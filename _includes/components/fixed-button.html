<!-- _includes/fixed-button.html -->
{% if page.layout != "contact" %}
<style>
    .fixed-button-container {
        display: none;
    }

    @media (max-width: 767px) {
        .fixed-button-container {
            display: block;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            width: calc(100% - 32px);
            max-width: 400px;
            padding: 0 16px;
        }
    }

    @media (max-width: 480px) {
        .fixed-button-container {
            bottom: 16px;
            width: calc(100% - 24px);
            padding: 0 12px;
        }
    }

    .fixed-button-container .btn-wrapper {
        position: relative;
        width: 100%;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .fixed-button-container .premium-btn {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px 24px;
        font-size: 16px;
        font-weight: 600;
        color: #FFFFFF;
        background: #0B1120;
        border: 1px solid #3B82F6;
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        min-height: 56px;
        transition: all 0.35s ease;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        overflow: visible;
    }

    .fixed-button-container .premium-btn:hover {
        transform: translateY(-3px);
        box-shadow:
            0 0 20px rgba(59, 130, 246, 0.5),
            0 0 40px rgba(59, 130, 246, 0.3),
            0 0 60px rgba(59, 130, 246, 0.15);
        border-color: #60A5FA;
    }

    .fixed-button-container .premium-btn:active {
        transform: scale(0.97);
    }

    .fixed-button-container .premium-btn .btn-content {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        z-index: 1;
        width: 100%;
    }

    .fixed-button-container .premium-btn .btn-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #60A5FA;
        filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.4));
    }

    .fixed-button-container .premium-btn .btn-text {
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 0.02em;
        color: #FFFFFF;
        text-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
    }

    .fixed-button-container .premium-btn .btn-badge {
        padding: 2px 10px;
        background: rgba(59, 130, 246, 0.15);
        border-radius: 12px;
        font-size: 10px;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #60A5FA;
        border: 1px solid rgba(59, 130, 246, 0.2);
        white-space: nowrap;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
    }

    .fixed-button-container .premium-btn .neon-glow {
        position: absolute;
        inset: -4px;
        border-radius: 16px;
        background: rgba(59, 130, 246, 0.1);
        filter: blur(20px);
        animation: neonPulse 2s ease-in-out infinite;
        z-index: -1;
        pointer-events: none;
    }

    @keyframes neonPulse {

        0%,
        100% {
            opacity: 0.5;
            transform: scale(1);
        }

        50% {
            opacity: 1;
            transform: scale(1.05);
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .fixed-button-container .premium-btn .neon-glow {
            animation: none !important;
        }
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
        .fixed-button-container {
            padding-bottom: env(safe-area-inset-bottom);
        }
    }
</style>

<div class="fixed-button-container">
    <div class="btn-wrapper">
        <a  href="https://wa.me/919887247112?text=Hey%2C%20I%20am%20coming%20from%20your%20website.%20I%20want%20to%20record%20a%20podcast."
          target="_blank" rel="noopener noreferrer" role="button"
          aria-label="Chat with us on WhatsApp to record your podcast"
         class="premium-btn">
            <span class="neon-glow"></span>
            <span class="btn-content flex">
                <span class="btn-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        class="shrink-0 whatsapp-icon" style="width: 24px; height: 24px; transform: scale(1);"
                        aria-hidden="true">
                        <path
                            d="M12.032 2.001c-5.516 0-10 4.484-10 10 0 1.852.507 3.657 1.459 5.248l-1.461 5.346 5.521-1.447c1.502.823 3.187 1.257 4.91 1.257 5.514 0 9.999-4.484 9.999-9.999s-4.485-10.405-10.029-10.405zm0 18.4c-1.543 0-3.058-.419-4.366-1.2l-.313-.186-3.276.857.876-3.189-.204-.324c-.846-1.335-1.293-2.875-1.293-4.455 0-4.602 3.744-8.347 8.346-8.347s8.345 3.745 8.345 8.347-3.744 8.497-8.345 8.497zm4.576-6.252c-.251-.125-1.484-.732-1.714-.816-.229-.083-.396-.125-.563.125-.167.25-.646.816-.792.983-.146.167-.292.188-.543.063-.251-.125-1.059-.391-2.017-1.245-.746-.666-1.249-1.487-1.395-1.739-.146-.251-.016-.387.11-.512.113-.114.251-.292.377-.438.125-.146.167-.25.25-.417.084-.167.042-.313-.021-.438-.062-.125-.562-1.354-.771-1.855-.203-.487-.409-.42-.563-.428-.146-.008-.313-.008-.479-.008-.167 0-.438.062-.667.313-.229.251-.875.855-.875 2.084 0 1.229.895 2.416 1.02 2.583.125.167 1.762 2.691 4.268 3.774.596.258 1.062.412 1.425.528.598.191 1.143.164 1.573.099.48-.073 1.479-.604 1.687-1.188.209-.584.209-1.084.146-1.188-.062-.104-.229-.167-.479-.292z" />
                    </svg>
                </span>

    </div>
</div>
{% endif %}
