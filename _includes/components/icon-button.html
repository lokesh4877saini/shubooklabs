<a 
  href="{{ include.href }}"
  
  {% if include.external %}
    target="_blank"
    rel="noopener noreferrer"
  {% endif %}

  class="
    text-gray-400
    hover:text-gold-light
    transition-all duration-300
    hover:scale-110
    transform
    {{ include.class }}
  "
>
  {% lucide_icon include.icon class="w-5 h-5" %}
</a>
