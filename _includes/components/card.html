<div class="bg-dark-card rounded-xl overflow-hidden hover:scale-105 transition-all duration-300 {{ include.class }}">
  {% if include.image %}
  <img src="{{ include.image }}" alt="{{ include.title }}" loading="lazy" class="w-full h-48 object-cover">
  {% endif %}
  <div class="p-6">
    {% if include.icon %}
    <div class="text-4xl mb-4">{{ include.icon }}</div>
    {% endif %}
    <h3 class="text-xl font-bold mb-2">{{ include.title }}</h3>
    <p class="text-gray-400 mb-4">{{ include.description }}</p>
    {{ include.content }}
  </div>
</div>
