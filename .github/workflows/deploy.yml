name: Deploy Jekyll to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_NO_WARNINGS: 1
  NODE_OPTIONS: --no-deprecation

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: FTP_SERVER 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Packages
        run: npm install

      - name: Build Tailwind
        run: npm run build

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Verify build output
        run: |
          ls -la ./_site/
          echo "Files in _site: $(find ./_site -type f | wc -l)"
          test -f ./_site/index.html && echo "✅ index.html found" || echo "❌ index.html missing"
          # Show video sizes
          echo "Video files:"
          find ./_site/assets/videos -name "*.mp4" -exec ls -lh {} \; 2>/dev/null || echo "No videos found"

      - name: Debug Secrets
        run: |
          echo "FTP_SERVER is set: ${{ secrets.FTP_SERVER != '' }}"
          echo "FTP_USERNAME is set: ${{ secrets.FTP_USERNAME != '' }}"
          echo "FTP_PASSWORD is set: ${{ secrets.FTP_PASSWORD != '' }}"
          echo "FTP_PORT is set: ${{ secrets.FTP_PORT != '' }}"

      - name: Install ncftp
        run: |
          sudo apt-get update
          sudo apt-get install -y ncftp

      - name: Deploy main files (excluding videos)
        run: |
          # Create a temp directory without videos
          mkdir -p ./_site_no_videos
          rsync -av --exclude='assets/videos/' ./_site/ ./_site_no_videos/
          
          ncftpput -R -v -m \
            -u "${{ secrets.FTP_USERNAME }}" \
            -p "${{ secrets.FTP_PASSWORD }}" \
            -P "${{ secrets.FTP_PORT }}" \
            "${{ secrets.FTP_SERVER }}" \
            public_html \
            ./_site_no_videos/*

      - name: Upload videos separately with retry
        run: |
          # Upload videos one by one with retry logic
          find ./_site/assets/videos -name "*.mp4" | while read video; do
            echo "Uploading: $video"
            retry=0
            max_retries=3
            while [ $retry -lt $max_retries ]; do
              if ncftpput -v -m \
                -u "${{ secrets.FTP_USERNAME }}" \
                -p "${{ secrets.FTP_PASSWORD }}" \
                -P "${{ secrets.FTP_PORT }}" \
                "${{ secrets.FTP_SERVER }}" \
                public_html/assets/videos/ \
                "$video"; then
                echo "✅ Uploaded: $video"
                break
              else
                retry=$((retry+1))
                echo "⚠️ Retry $retry/$max_retries for $video"
                sleep 5
              fi
            done
          done

      - name: Upload remaining assets (non-video)
        if: success() || failure()
        run: |
          # Upload any remaining files (images, js, css, etc.)
          find ./_site/assets -type f ! -path "*/videos/*" | while read file; do
            echo "Uploading: $file"
            ncftpput -v -m \
              -u "${{ secrets.FTP_USERNAME }}" \
              -p "${{ secrets.FTP_PASSWORD }}" \
              -P "${{ secrets.FTP_PORT }}" \
              "${{ secrets.FTP_SERVER }}" \
              public_html/ \
              "$file"
          done

      - name: Verify deployment
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Site should be available at: https://shubook.in"