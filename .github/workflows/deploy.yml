name: Deploy Jekyll to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_NO_WARNINGS: 1
  NODE_OPTIONS: --no-deprecation

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: FTP_SERVER 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Packages
        run: npm install

      - name: Build Tailwind
        run: npm run build

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger
        run: |
          lftp -c "
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p ${{ secrets.FTP_PORT }} ${{ secrets.FTP_SERVER }}
            mirror -R -v --delete --parallel=4 \
              --exclude='.git*' \
              --exclude='node_modules/' \
              --exclude='.ftp-deploy-sync-state.json' \
              ./_site ./public_html
            quit
          "

      - name: Verify deployment
        if: success()
        run: echo "✅ Site deployed to https://shubook.in"