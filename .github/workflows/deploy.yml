name: Deploy Jekyll to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_NO_WARNINGS: 1
  NODE_OPTIONS: --no-deprecation

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Packages
        run: npm install

      - name: Build Tailwind
        run: npm run build

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Verify build output
        run: |
          ls -la ./_site/
          echo "Files in _site: $(find ./_site -type f | wc -l)"
          test -f ./_site/index.html && echo "✅ index.html found" || echo "❌ index.html missing"

      - name: Install ncftp
        run: |
          sudo apt-get update
          sudo apt-get install -y ncftp

      - name: Deploy to Hostinger
        run: |
          # Change to _site directory and upload contents directly to public_html
          cd ./_site
          ncftpput -R -v -m \
            -u "${{ secrets.FTP_USERNAME }}" \
            -p "${{ secrets.FTP_PASSWORD }}" \
            -P "${{ secrets.FTP_PORT }}" \
            "${{ secrets.FTP_SERVER }}" \
            public_html \
            *
          cd ..

      - name: Verify deployment
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Site should be available at: https://shubook.in"