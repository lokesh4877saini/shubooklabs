name: Deploy Jekyll to Hostinger

on:
  push:
    branches:
      - main
  # Add manual trigger for testing
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    
    # Add timeout to prevent hanging
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Packages
        run: npm install

      - name: Build Tailwind
        run: npm run build

      - name: Build Jekyll
        run: bundle exec jekyll build

      # Add debug step to verify build output
      - name: Verify build output
        run: |
          ls -la ./_site/
          echo "Files in _site: $(find ./_site -type f | wc -l)"

      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./_site/
          server-dir: /public_html/
          # Add these optional but helpful parameters
          protocol: ftp
          log-level: verbose  # This will show you what's being uploaded
          dangerous-clean-slate: false  # Set to true if you want to clean remote dir first